<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Speed lines (left side) -->
  <line x1="4" y1="80" x2="38" y2="80" stroke="#e8e2db" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="97" x2="40" y2="97" stroke="#e8e2db" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="14" y1="112" x2="42" y2="112" stroke="#e8e2db" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Upper wing (spread up and back) -->
  <ellipse cx="72" cy="96" rx="38" ry="14" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(-52 72 96)"/>
  <!-- Lower wing (spread down and back) -->
  <ellipse cx="74" cy="162" rx="34" ry="12" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(28 74 162)"/>

  <!-- Body (leaning forward, slightly raised) -->
  <ellipse cx="104" cy="130" rx="52" ry="36" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5" transform="rotate(-12 104 130)"/>

  <!-- Head -->
  <circle cx="148" cy="80" r="34" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5"/>

  <!-- Comb -->
  <path d="M134,48 Q137,34 142,47 Q146,31 151,46 Q155,32 160,47 Q164,36 168,50" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Cheek blush -->
  <ellipse cx="135" cy="88" rx="10" ry="7" fill="#ffb4ab" opacity="0.5"/>

  <!-- Eye (wide open, gleeful — NOT squinting like hen-runner) -->
  <circle cx="156" cy="76" r="12" fill="#2a1f0e"/>
  <circle cx="159" cy="73" r="4.5" fill="white" opacity="0.7"/>

  <!-- Open beak (squawking with glee) -->
  <path d="M178,78 L196,83 L178,89" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="178" y1="83" x2="195" y2="83" stroke="#2a1f0e" stroke-width="1.5"/>

  <!-- Wattle -->
  <ellipse cx="182" cy="96" rx="6" ry="8" fill="#ffb4ab" stroke="#2a1f0e" stroke-width="1.4"/>

  <!-- Feet tucked up mid-leap -->
  <line x1="100" y1="162" x2="82" y2="176" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="82" y1="176" x2="64" y2="172" stroke="#f0c078" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="176" x2="78" y2="186" stroke="#f0c078" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="160" x2="98" y2="174" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="98" y1="174" x2="80" y2="170" stroke="#f0c078" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="174" x2="94" y2="184" stroke="#f0c078" stroke-width="3" stroke-linecap="round"/>
</svg>
