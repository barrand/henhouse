<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings pressed to cheeks -->
  <ellipse cx="46" cy="96" rx="22" ry="30" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(-15 46 96)"/>
  <ellipse cx="154" cy="96" rx="22" ry="30" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(15 154 96)"/>
  <!-- Body -->
  <ellipse cx="100" cy="152" rx="50" ry="42" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5"/>
  <!-- Head -->
  <circle cx="100" cy="84" r="40" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5"/>
  <!-- Comb (drooping slightly) -->
  <path d="M84,48 Q86,34 91,46 Q95,28 100,42 Q105,28 109,44 Q114,34 116,48" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- X eyes -->
  <line x1="76" y1="68" x2="92" y2="84" stroke="#2a1f0e" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="68" x2="76" y2="84" stroke="#2a1f0e" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="68" x2="124" y2="84" stroke="#2a1f0e" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="68" x2="108" y2="84" stroke="#2a1f0e" stroke-width="4" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M148,44 Q154,36 160,44 Q160,54 154,56 Q148,54 148,44 Z" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2"/>
  <!-- Beak -->
  <ellipse cx="100" cy="104" rx="10" ry="7" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8"/>
  <!-- Wattle -->
  <ellipse cx="100" cy="118" rx="8" ry="10" fill="#ffb4ab" stroke="#2a1f0e" stroke-width="1.5"/>
  <!-- Legs -->
  <line x1="82" y1="190" x2="72" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="190" x2="64" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="118" y1="190" x2="128" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="120" y1="190" x2="136" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
</svg>
