  <ellipse cx="158" cy="160" rx="16" ry="18" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <circle cx="158" cy="145" r="12" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <path d="M153,138 Q154,132 157,137 Q159,131 161,137 Q162,133 166,138" fill="#f0c078" stroke="#2a1f0e" stroke-width="1" stroke-linejoin="round"/>
  <circle cx="156" cy="143" r="5" fill="#2a1f0e"/>
