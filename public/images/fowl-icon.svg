  <path d="M50,65 L100,35 L150,65" fill="#f0c078" stroke="#2a1f0e" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Coop door/window -->
  <rect x="85" y="80" width="30" height="35" fill="#2a1f0e" opacity="0.15" rx="2"/>

  <!-- Top chicken (guesser - on coop) -->
  <ellipse cx="100" cy="52" rx="20" ry="22" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2"/>
  <circle cx="100" cy="32" r="16" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2"/>
  <path d="M92,20 Q94,12 97,19 Q99,11 101,18 Q103,10 108,19" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.3" stroke-linejoin="round"/>
  <circle cx="96" cy="30" r="6" fill="#2a1f0e"/>
  <circle cx="97" cy="29" r="2" fill="white" opacity="0.7"/>
  <circle cx="104" cy="30" r="6" fill="#2a1f0e"/>
  <circle cx="105" cy="29" r="2" fill="white" opacity="0.7"/>
  <ellipse cx="100" cy="38" rx="6" ry="4" fill="#f0c078" stroke="#2a1f0e" stroke-width="1"/>
  <ellipse cx="100" cy="44" rx="4" ry="5" fill="#ffb4ab" stroke="#2a1f0e" stroke-width="1"/>

  <!-- Lower left chicken (giver) -->
  <ellipse cx="42" cy="160" rx="16" ry="18" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <circle cx="42" cy="145" r="12" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <path d="M37,138 Q38,132 41,137 Q43,131 45,137 Q46,133 50,138" fill="#f0c078" stroke="#2a1f0e" stroke-width="1" stroke-linejoin="round"/>
  <circle cx="40" cy="143" r="5" fill="#2a1f0e"/>
  <circle cx="41" cy="142" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="46" cy="143" r="5" fill="#2a1f0e"/>
  <circle cx="47" cy="142" r="1.5" fill="white" opacity="0.6"/>

  <!-- Center lower chicken (giver) -->
  <ellipse cx="100" cy="165" rx="16" ry="18" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <circle cx="100" cy="150" r="12" fill="#e8e2db" stroke="#2a1f0e" stroke-width="1.8"/>
  <path d="M95,143 Q96,137 99,142 Q101,136 103,142 Q104,138 108,143" fill="#f0c078" stroke="#2a1f0e" stroke-width="1" stroke-linejoin="round"/>
  <circle cx="98" cy="148" r="5" fill="#2a1f0e"/>
