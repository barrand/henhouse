<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Orbiting sparkles -->
  <polygon points="28,44 30,51 37,53 30,55 28,62 26,55 19,53 26,51" fill="#f0c078" stroke="#2a1f0e" stroke-width="0.8"/>
  <polygon points="100,10 102,17 109,19 102,21 100,28 98,21 91,19 98,17" fill="#f0c078" stroke="#2a1f0e" stroke-width="0.8"/>
  <polygon points="168,36 170,43 177,45 170,47 168,54 166,47 159,45 166,43" fill="#f0c078" stroke="#2a1f0e" stroke-width="0.8"/>
  <polygon points="176,100 178,106 184,108 178,110 176,116 174,110 168,108 174,106" fill="#f0c078" stroke="#2a1f0e" stroke-width="0.8"/>
  <polygon points="16,100 18,106 24,108 18,110 16,116 14,110 8,108 14,106" fill="#f0c078" stroke="#2a1f0e" stroke-width="0.8"/>

  <!-- Wings RAISED UP (celebration) -->
  <ellipse cx="34" cy="110" rx="22" ry="32" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(-50 34 110)"/>
  <ellipse cx="166" cy="110" rx="22" ry="32" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(50 166 110)"/>

  <!-- Body -->
  <ellipse cx="100" cy="150" rx="52" ry="44" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5"/>

  <!-- Head (tilted back slightly, celebratory) -->
  <circle cx="100" cy="75" r="40" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5" transform="rotate(-8 100 75)"/>

  <!-- Comb (sharp, energetic) -->
  <path d="M80,35 Q84,15 90,32 Q96,12 102,36 Q108,14 114,33 Q120,18 126,38" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Cheeks (flushed, big) -->
  <ellipse cx="64" cy="85" rx="13" ry="10" fill="#ffb4ab" opacity="0.65"/>
  <ellipse cx="136" cy="85" rx="13" ry="10" fill="#ffb4ab" opacity="0.65"/>

  <!-- Star pupils (left) -->
  <circle cx="84" cy="72" r="13" fill="#2a1f0e"/>
  <polygon points="84,60 85.5,68 93,68 87,73 89,81 84,76 79,81 81,73 75,68 82.5,68" fill="#f0c078"/>

  <!-- Star pupils (right) -->
  <circle cx="116" cy="72" r="13" fill="#2a1f0e"/>
  <polygon points="116,60 117.5,68 125,68 119,73 121,81 116,76 111,81 113,73 107,68 114.5,68" fill="#f0c078"/>

  <!-- Beak (wide, open) -->
  <ellipse cx="100" cy="100" rx="13" ry="9" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8"/>

  <!-- Wattle -->
  <ellipse cx="100" cy="118" rx="9" ry="11" fill="#ffb4ab" stroke="#2a1f0e" stroke-width="1.5"/>

  <!-- Legs -->
  <line x1="82" y1="190" x2="72" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="190" x2="64" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="118" y1="190" x2="128" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="120" y1="190" x2="136" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
</svg>
