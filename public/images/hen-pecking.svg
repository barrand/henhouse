<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Head -->
  <circle cx="100" cy="88" r="52" fill="#e8e2db" stroke="#2a1f0e" stroke-width="2.5"/>
  <!-- Comb -->
  <path d="M72,42 Q76,22 82,38 Q86,18 92,34 Q98,14 104,32 Q110,16 116,32 Q122,20 128,38" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Eyes (looking down) -->
  <circle cx="82" cy="82" r="12" fill="#2a1f0e"/>
  <circle cx="118" cy="82" r="12" fill="#2a1f0e"/>
  <circle cx="78" cy="86" r="4" fill="#e8e2db"/>
  <circle cx="114" cy="86" r="4" fill="#e8e2db"/>
  <circle cx="77" cy="85" r="1.5" fill="#f0c078"/>
  <circle cx="113" cy="85" r="1.5" fill="#f0c078"/>
  <!-- Wattle -->
