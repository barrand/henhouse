<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings raised up -->
  <ellipse cx="46" cy="112" rx="22" ry="38" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(-30 46 112)"/>
  <ellipse cx="154" cy="112" rx="22" ry="38" fill="#d6c5a5" stroke="#2a1f0e" stroke-width="2" transform="rotate(30 154 112)"/>
  <!-- Body -->
