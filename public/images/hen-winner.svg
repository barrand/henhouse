  <!-- Comb -->
  <path d="M82,48 Q86,30 92,44 Q97,24 103,40 Q108,22 114,38 Q118,28 122,44" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Laurel wreath -->
  <ellipse cx="70" cy="56" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(-40 70 56)"/>
  <ellipse cx="64" cy="58" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(30 64 58)"/>
  <ellipse cx="82" cy="48" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(-20 82 48)"/>
  <ellipse cx="78" cy="50" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(18 78 50)"/>
  <ellipse cx="100" cy="44" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(-5 100 44)"/>
  <ellipse cx="100" cy="46" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(5 100 46)"/>
  <ellipse cx="118" cy="48" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(20 118 48)"/>
  <ellipse cx="122" cy="50" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(-18 122 50)"/>
  <ellipse cx="130" cy="56" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(40 130 56)"/>
  <ellipse cx="136" cy="58" rx="8" ry="4.5" fill="#91c595" stroke="#2a1f0e" stroke-width="1.2" transform="rotate(-30 136 58)"/>
  <!-- Wreath center gem -->
  <circle cx="100" cy="44" r="5" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.2"/>
  <!-- Cheeks -->
  <ellipse cx="70" cy="94" rx="10" ry="7" fill="#ffb4ab" opacity="0.5"/>
  <ellipse cx="130" cy="94" rx="10" ry="7" fill="#ffb4ab" opacity="0.5"/>
  <!-- Eyes — wide open, big shine -->
  <circle cx="84" cy="78" r="13" fill="#2a1f0e"/>
  <circle cx="116" cy="78" r="13" fill="#2a1f0e"/>
  <circle cx="79" cy="73" r="4.5" fill="#e8e2db"/>
  <circle cx="111" cy="73" r="4.5" fill="#e8e2db"/>
  <circle cx="78" cy="72" r="2" fill="#f0c078"/>
  <circle cx="110" cy="72" r="2" fill="#f0c078"/>
  <!-- Beak (big happy) -->
  <ellipse cx="100" cy="106" rx="13" ry="9" fill="#f0c078" stroke="#2a1f0e" stroke-width="1.8"/>
  <!-- Wattle -->
  <ellipse cx="100" cy="122" rx="9" ry="11" fill="#ffb4ab" stroke="#2a1f0e" stroke-width="1.5"/>
  <!-- Legs -->
  <line x1="82" y1="190" x2="72" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="190" x2="64" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="118" y1="190" x2="128" y2="200" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="120" y1="190" x2="136" y2="198" stroke="#f0c078" stroke-width="3.5" stroke-linecap="round"/>
